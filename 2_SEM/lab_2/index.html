<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title> Трансформация и анимация</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="http://d3js.org/d3.v7.min.js"> </script>
    <script src="JavaScript/image.js"></script>
  </head>
  <body>   

      <form id="setting">
    <p class="cord"><b>Координаты рисунка</b><br>
      <label for="cx">x: </label>
      <input type="number" id="cx" value="300" max="600" min="0">
      <label class="hide" for="cx_finish">до </label>
      <input class="hide" type="number" id="cx_finish" value="300" max="600" min="0"><br>
      <label for="cy">y: </label>
      <input type="number" id="cy" value="300" max="600" min="0">
      <label class="hide" for="cy_finish">до </label>
      <input class="hide" type="number" id="cy_finish" value="300" max="600" min="0">
    </p>
    <p class="put"><b>Путь перемещения</b><br>
        <select class="hide" id="put_select" name="level_1">
        <option value="0">Буквой "Г"</option>
        <option value="1">Круг</option>
     </select>
    </p>
    <p class="size"><b>Масштаб</b><br>
      <label for="mx">По x: </label>
      <input type="number" id="mx" value="0" max="600" min="0">
      <label class="hide" for="mx_finish">до </label>
      <input class="hide" type="number" id="mx_finish" value="0" max="600" min="0"><br>
      <label for="my">По y: </label>
      <input type="number" id="my" value="0" max="600" min="0">
      <label class="hide" for="my_finish">до </label>
      <input class="hide" type="number" id="my_finish" value="0" max="600" min="0">
    </p>
    <p class="ang"><b>Поворот</b><br>
      <label for="a">Угол: </label>
      <input type="number" id="a" value="0" max="360" min="-360">
      <label class="hide" for="a_finish">до </label>
      <input class="hide" type="number" id="a_finish" value="0" max="360" min="-360">
    </p>
    <p>
      <input id="draw" type="button" value="Нарисовать">
      <input id="clear" type="button" value="Очистить">
    </p>
    <div class="anim">
      <input id="check_anim" type="checkbox">
      <label for="check_anim">Включить анимацию? </label>
      <select class="hide" id="anim_select" name="level_1">
        <option value="easeLinear">linear</option>
        <option value="easeElastic">elastic</option>
        <option value="easeBounce">bounce</option>
     </select>
     <br>
     <input class="hide" id="put_check" type="checkbox">
     <label class="hide" for="put_check">Перемещение вдоль пути? </label>
     <input class="hide" id="animate" type="button" value="Анимировать" style="display: block;">
    </div>
  </form>
    <svg></svg>
    <script src="JavaScript/path.js"></script>
    <script src="JavaScript/main.js"></script>
  </body>
</html>
