<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>ПЗ_2</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="http://d3js.org/d3.v7.min.js"> </script>
    <script src="JavaScript/image.js"></script>
  </head>
  <body>   

      <form id="setting">
    <p class="size"><b>Масштаб</b><br>
      <label for="mx">По x: </label>
      <input type="number" id="mx" value="1" max="600" min="0">
      <label class="hide" for="mx_finish">до </label>
      <input class="hide" type="number" id="mx_finish" value="0" max="600" min="0"><br>
      <label for="my">По y: </label>
      <input type="number" id="my" value="1" max="600" min="0">
      <label class="hide" for="my_finish">до </label>
      <input class="hide" type="number" id="my_finish" value="0" max="600" min="0">
    </p>
    <p class="ang"><b>Поворот</b><br>
      <label for="a">Угол: </label>
      <input type="number" id="a" value="0" max="360" min="-360">
      <label class="hide" for="a_finish">до </label>
      <input class="hide" type="number" id="a_finish" value="0" max="360" min="-360">
    </p>
    <p class="ang"><b>Время перемещения</b><br>
      <label for="time">Угол: </label>
      <input type="number" id="time" value="6000" max="100000" min="0">
    </p>
    <p>
      <input id="animate" type="button" value="Анимировать">
      <input id="clear" type="button" value="Очистить">
    </p>
    <div class="anim">
      <input id="check_anim" type="checkbox">
      <label for="check_anim">Доп эффекты? </label>
      <select class="hide" id="anim_select" name="level_1">
        <option value="easeLinear">linear</option>
        <option value="easeElastic">elastic</option>
        <option value="easeBounce">bounce</option>
     </select>
    </div>
  </form>
    <svg class="main"><svg class="pict"></svg></svg>
    <script src="JavaScript/path.js"></script>
    <script src="JavaScript/main.js"></script>
  </body>
</html>
